<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الإدارة المدرسية - أستاذة علياء</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* حاوية تسجيل الدخول */
        .login-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #1a73e8;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background: #155cb4;
        }

        .error-msg {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* حاوية الواجهة الرئيسية */
        .main-dashboard {
            display: none;
            width: 100%;
            max-width: 1000px; /* قمنا بتوسيع الحاوية قليلاً لتناسب 5 أزرار بشكل مريح */
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .header-area h1 {
            color: #1a73e8;
            font-size: 24px;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: #bd2130;
        }

        .main-dashboard > p {
            color: #666;
            margin-bottom: 30px;
        }

        /* شبكة الأزرار/الأيقونات */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .card-button {
            background: white;
            padding: 30px 15px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
        }

        .card-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            border-color: #1a73e8;
        }

        .icon {
            font-size: 45px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- أولاً: واجهة تسجيل الدخول -->
    <div class="login-container" id="loginBox">
        <h2>تسجيل الدخول</h2>
        <div class="input-group">
            <label>اسم المستخدم:</label>
            <input type="text" id="username" placeholder="أدخل اسم المستخدم">
        </div>
        <div class="input-group">
            <label>كلمة المرور:</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>
        <button class="btn-login" onclick="checkLogin()">دخول</button>
        <div class="error-msg" id="errorMessage">اسم المستخدم أو كلمة المرور غير صحيحة!</div>
    </div>

    <!-- ثانياً: الواجهة الرئيسية للأنظمة السحابية -->
    <div class="main-dashboard" id="dashboardBox">
        <div class="header-area">
            <h1>بوابة الإدارة المدرسية</h1>
            <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
        </div>
        <p>  Alia welcomes you  ، يرجى اختيار المنظومة المطلوبة للعمل:</p>
        
        <div class="grid-container">
            
            <!-- الزر الأول (الجديد): تنظيم جدول الامتحانات -->
            <a href="indexexam.html" target="_blank" class="card-button">
                <div class="icon">📅</div>
                <div class="card-title">تنظيم جدول الامتحانات</div>
            </a>

            <!-- الزر الثاني: نظام توزيع خرائط الجلوس -->
            <a href="seats.html" target="_blank" class="card-button">
                <div class="icon">🪑</div>
                <div class="card-title">نظام التوزيع لخرائط الجلوس</div>
            </a>

            <!-- الزر الثالث: منظومة نتائج الصفوف الأولية -->
            <a href="results.html" target="_blank" class="card-button">
                <div class="icon">📊</div>
                <div class="card-title">منظومة نتائج الصفوف الأولية</div>
            </a>

            <!-- الزر الرابع: منظومة الدرجات للصفين الخامس والسادس -->
            <a href="results56.html" target="_blank" class="card-button">
                <div class="icon">📈</div>
                <div class="card-title">منظومة الدرجات للصفين الخامس والسادس</div>
            </a>

            <!-- الزر الخامس: منظومة الغياب والحضور -->
            <a href="audience.html" target="_blank" class="card-button">
                <div class="icon">📝</div>
                <div class="card-title">منظومة الغياب والحضور</div>
            </a>

        </div>
    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem("isLoggedIn") === "true") {
                showDashboard();
            }
        };

        function checkLogin() {
            const correctUser = "alyaa";
            const correctPass = "2004";

            const userInp = document.getElementById("username").value;
            const passInp = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMessage");

            if (userInp === correctUser && passInp === correctPass) {
                localStorage.setItem("isLoggedIn", "true");
                showDashboard();
            } else {
                errorMsg.style.display = "block";
            }
        }

        function showDashboard() {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("dashboardBox").style.display = "block";
            document.body.style.alignItems = "flex-start";
            document.body.style.paddingTop = "40px";
        }

        function logout() {
            localStorage.removeItem("isLoggedIn");
            location.reload(); 
        }
    </script>
</body>
</html>
